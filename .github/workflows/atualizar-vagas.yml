name: Atualizar vagas SST

# Atualiza o site TODOS OS DIAS, com a rodada principal ao MEIO-DIA de Brasilia.
# Brasilia (UTC-3):  09h = 12 UTC | 12h(meio-dia) = 15 UTC | 16h = 19 UTC
# Obs.: o agendador do GitHub Actions pode atrasar alguns minutos em horarios
# de pico - por isso ha tambem uma rodada de manha e outra a tarde, garantindo
# que o site nunca passe um dia sem atualizar.
on:
  schedule:
    - cron: "0 12 * * *"   # 09h Brasilia (manha)
    - cron: "0 15 * * *"   # 12h Brasilia (MEIO-DIA - rodada principal)
    - cron: "0 19 * * *"   # 16h Brasilia (tarde)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias de teste
        run: pip install pytest

      - name: Rodar testes (nao publica se quebrar)
        run: python -m pytest -q

      - name: Rodar o coletor de vagas
        run: python scripts/coletar_vagas.py

      - name: Copiar dados para a pasta do site
        run: |
          mkdir -p docs/data
          cp data/vagas.json docs/data/vagas.json

      - name: Publicar alteracoes (se houver)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/vagas.json docs/data/vagas.json
          if git diff --staged --quiet; then
            echo "Nenhuma vaga nova hoje."
          else
            git commit -m "Atualizacao automatica de vagas - $(date +'%d/%m/%Y')"
            git push
          fi
