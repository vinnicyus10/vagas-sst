name: Atualizar vagas SST

# Roda automaticamente 4x por dia (06h, 12h, 15h, 18h horario de Brasilia =
# 09h, 15h, 18h, 21h UTC) e tambem pode ser disparado manualmente pelo botao
# "Run workflow".
on:
  schedule:
    - cron: "0 9 * * *"
    - cron: "0 15 * * *"
    - cron: "0 18 * * *"
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rodar o coletor de vagas
        run: python scripts/coletar_vagas.py

      - name: Copiar dados para a pasta do site
        run: |
          mkdir -p docs/data
          cp data/vagas.json docs/data/vagas.json

      - name: Publicar alteracoes (se houver)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/vagas.json docs/data/vagas.json
          if git diff --staged --quiet; then
            echo "Nenhuma vaga nova hoje."
          else
            git commit -m "Atualizacao automatica de vagas - $(date +'%d/%m/%Y')"
            git push
          fi
